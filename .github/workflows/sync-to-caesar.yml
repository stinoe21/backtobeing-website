name: Sync naar Caesar z'n repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push naar Cschoorl/landingpage-camino
        run: |
          git remote add caesar https://x-access-token:${{ secrets.CAESAR_REPO_TOKEN }}@github.com/Cschoorl/landingpage-camino.git
          git push caesar main --force
